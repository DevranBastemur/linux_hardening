<div class="px-5 py-3 bg-slate-900 border-b border-slate-800">
  <p class="text-xs text-slate-500 mb-3 uppercase tracking-widest font-semibold">Hazir Paketler</p>
  <div class="flex gap-3 flex-wrap">

    <!-- Temel Guvenlik -->
    <div class="pkg-card" data-pkg="basic" onclick="selectPackage('basic', this)">
      <div class="w-8 h-8 bg-green-500/20 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <div>
        <div class="font-semibold text-sm text-white">Temel Guvenlik</div>
        <div class="text-xs text-slate-400">SSH + Kernel temel ayarlar</div>
      </div>
    </div>

    <!-- Agresif Sikistirma -->
    <div class="pkg-card" data-pkg="aggressive" onclick="selectPackage('aggressive', this)">
      <div class="w-8 h-8 bg-red-500/20 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
        </svg>
      </div>
      <div>
        <div class="font-semibold text-sm text-white">Agresif Sikistirma</div>
        <div class="text-xs text-slate-400">Maksimum guvenlik, tum onlemler</div>
      </div>
    </div>

    <!-- Web Sunucusu -->
    <div class="pkg-card" data-pkg="webserver" onclick="selectPackage('webserver', this)">
      <div class="w-8 h-8 bg-blue-500/20 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"/>
        </svg>
      </div>
      <div>
        <div class="font-semibold text-sm text-white">Web Sunucusu</div>
        <div class="text-xs text-slate-400">HTTP/HTTPS + UFW + SSH</div>
      </div>
    </div>

    <!-- Sifirla -->
    <div class="pkg-card" data-pkg="none" onclick="selectPackage('none', this)">
      <div class="w-8 h-8 bg-slate-500/20 rounded-lg flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </div>
      <div>
        <div class="font-semibold text-sm text-white">Sifirla</div>
        <div class="text-xs text-slate-400">Tum secimleri temizle</div>
      </div>
    </div>

  </div>
</div>
