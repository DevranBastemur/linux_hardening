<!-- SSH SIKISTIRMA -->
<div class="bg-slate-900 border border-slate-700 rounded-xl overflow-hidden">
  <div class="section-header flex items-center justify-between px-4 py-3 bg-slate-800/80 hover:bg-slate-800 transition-colors"
       data-section="ssh" onclick="toggleSection('ssh-body')">
    <div class="flex items-center gap-2">
      <div class="w-2 h-2 bg-cyan-400 rounded-full"></div>
      <span class="font-semibold text-sm text-white">SSH Sikistirma</span>
      <span class="badge bg-cyan-900/60 text-cyan-300">Kritik</span>
    </div>
    <svg class="w-4 h-4 text-slate-400 arrow-icon transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
    </svg>
  </div>

  <div class="section-body" id="ssh-body">
    <div class="p-4 space-y-1">

      <label class="flex items-start gap-3 cursor-pointer scan-item p-2 rounded-lg">
        <input type="checkbox" id="ssh_disable_root" class="chk-ssh w-4 h-4 mt-0.5 flex-shrink-0" onchange="updatePreview()">
        <div>
          <div class="text-sm font-medium text-white">Root Girisi Kapatilsin</div>
          <div class="text-xs text-slate-400 terminal-font mt-0.5">PermitRootLogin no</div>
        </div>
      </label>

      <label class="flex items-start gap-3 cursor-pointer scan-item p-2 rounded-lg">
        <input type="checkbox" id="ssh_disable_password" class="chk-ssh w-4 h-4 mt-0.5 flex-shrink-0" onchange="updatePreview()">
        <div>
          <div class="text-sm font-medium text-white">Parola ile Giris Engellensin</div>
          <div class="text-xs text-slate-400 terminal-font mt-0.5">PasswordAuthentication no</div>
        </div>
      </label>

      <label class="flex items-start gap-3 cursor-pointer scan-item p-2 rounded-lg">
        <input type="checkbox" id="ssh_disable_x11" class="chk-ssh w-4 h-4 mt-0.5 flex-shrink-0" onchange="updatePreview()">
        <div>
          <div class="text-sm font-medium text-white">X11 Forwarding Kapatilsin</div>
          <div class="text-xs text-slate-400 terminal-font mt-0.5">X11Forwarding no</div>
        </div>
      </label>

      <label class="flex items-start gap-3 cursor-pointer scan-item p-2 rounded-lg">
        <input type="checkbox" id="ssh_disable_agent" class="chk-ssh w-4 h-4 mt-0.5 flex-shrink-0" onchange="updatePreview()">
        <div>
          <div class="text-sm font-medium text-white">Agent Forwarding Kapatilsin</div>
          <div class="text-xs text-slate-400 terminal-font mt-0.5">AllowAgentForwarding no</div>
        </div>
      </label>

      <label class="flex items-start gap-3 cursor-pointer scan-item p-2 rounded-lg">
        <input type="checkbox" id="ssh_login_grace" class="chk-ssh w-4 h-4 mt-0.5 flex-shrink-0" onchange="updatePreview()">
        <div>
          <div class="text-sm font-medium text-white">Login Grace Time Kisitlansın (30s)</div>
          <div class="text-xs text-slate-400 terminal-font mt-0.5">LoginGraceTime 30</div>
        </div>
      </label>

      <div class="flex items-center gap-3 p-2">
        <label class="text-sm font-medium text-white whitespace-nowrap" for="ssh_max_tries">Max Hatali Deneme:</label>
        <input type="number" id="ssh_max_tries" min="1" max="10" value="3" onchange="updatePreview()">
        <span class="text-xs text-slate-400 terminal-font">MaxAuthTries</span>
      </div>

    </div>
  </div>
</div>
